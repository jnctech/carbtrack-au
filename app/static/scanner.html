<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CarbTrack AU — Barcode Scanner</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --border: #334155;
    --text: #f1f5f9; --muted: #94a3b8; --accent: #38bdf8;
    --green: #4ade80; --red: #f87171; --amber: #fbbf24;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100dvh; display: flex; flex-direction: column;
    -webkit-tap-highlight-color: transparent;
  }
  header {
    padding: 1rem; text-align: center;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 1.25rem; font-weight: 600; }
  header p { font-size: 0.8rem; color: var(--muted); margin-top: 0.25rem; }

  main { flex: 1; padding: 1rem; max-width: 480px; margin: 0 auto; width: 100%; }

  /* Scanner region */
  #reader { width: 100%; border-radius: 0.5rem; overflow: hidden; }
  #reader video { border-radius: 0.5rem; }

  /* Manual entry */
  .manual-entry {
    display: flex; gap: 0.5rem; margin-top: 1rem;
  }
  .manual-entry input {
    flex: 1; padding: 0.75rem; border-radius: 0.5rem;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 1rem;
    -webkit-appearance: none;
  }
  .manual-entry input::placeholder { color: var(--muted); }
  .manual-entry button {
    padding: 0.75rem 1.25rem; border-radius: 0.5rem; border: none;
    background: var(--accent); color: var(--bg); font-weight: 600;
    font-size: 1rem; cursor: pointer; white-space: nowrap;
  }

  /* Serving size input */
  .serving-row {
    display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem;
  }
  .serving-row label { font-size: 0.9rem; color: var(--muted); white-space: nowrap; }
  .serving-row input {
    width: 5rem; padding: 0.5rem; border-radius: 0.5rem;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 1rem; text-align: center;
    -webkit-appearance: none;
  }
  .serving-row span { font-size: 0.9rem; color: var(--muted); }

  /* Result card */
  .result-card {
    margin-top: 1rem; padding: 1.25rem; border-radius: 0.75rem;
    background: var(--surface); border: 1px solid var(--border);
    display: none;
  }
  .result-card.visible { display: block; }
  .result-card.error { border-color: var(--red); }
  .food-name { font-size: 1.1rem; font-weight: 600; }
  .food-brand { font-size: 0.85rem; color: var(--muted); margin-top: 0.15rem; }
  .food-category { font-size: 0.8rem; color: var(--muted); }

  .carb-hero {
    margin-top: 1rem; display: flex; align-items: baseline; gap: 0.5rem;
  }
  .carb-hero .value { font-size: 2.5rem; font-weight: 700; color: var(--green); }
  .carb-hero .unit { font-size: 1rem; color: var(--muted); }

  .serving-carbs {
    margin-top: 0.5rem; padding: 0.75rem; border-radius: 0.5rem;
    background: var(--bg); display: none;
  }
  .serving-carbs.visible { display: flex; align-items: baseline; gap: 0.5rem; }
  .serving-carbs .value { font-size: 1.5rem; font-weight: 600; color: var(--amber); }
  .serving-carbs .label { font-size: 0.85rem; color: var(--muted); }

  .nutrition-grid {
    margin-top: 1rem; display: grid; grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
  }
  .nutrition-grid .item {
    display: flex; justify-content: space-between;
    padding: 0.35rem 0; border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .nutrition-grid .item .label { color: var(--muted); }

  .conflict-badge {
    display: inline-block; margin-top: 0.5rem; padding: 0.25rem 0.5rem;
    border-radius: 0.25rem; font-size: 0.75rem; font-weight: 600;
    background: rgba(248, 113, 113, 0.15); color: var(--red);
  }

  .source-badge {
    display: inline-block; margin-top: 0.5rem; padding: 0.25rem 0.5rem;
    border-radius: 0.25rem; font-size: 0.75rem; font-weight: 600;
    background: rgba(56, 189, 248, 0.15); color: var(--accent);
  }

  .error-msg { color: var(--red); font-size: 0.95rem; }
  .success-msg { color: var(--green); font-size: 0.95rem; }

  /* Import buttons */
  .import-actions {
    margin-top: 1rem; display: flex; gap: 0.5rem;
  }
  .import-actions button {
    flex: 1; padding: 0.75rem; border-radius: 0.5rem; border: none;
    font-weight: 600; font-size: 0.9rem; cursor: pointer;
  }
  .import-actions button:disabled {
    opacity: 0.5; cursor: not-allowed;
  }
  .btn-staging {
    background: var(--accent); color: var(--bg);
  }
  .btn-quick {
    background: var(--green); color: var(--bg);
  }

  /* Status bar */
  .status {
    text-align: center; padding: 0.5rem; font-size: 0.8rem; color: var(--muted);
  }

  /* Torch toggle */
  .torch-row {
    display: none; justify-content: center; margin-top: 0.5rem;
  }
  .torch-row.visible { display: flex; }
  .torch-btn {
    padding: 0.5rem 1rem; border-radius: 0.5rem; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 0.9rem; cursor: pointer;
  }
  .torch-btn.on { background: var(--amber); color: var(--bg); border-color: var(--amber); }
</style>
</head>
<body>
<header>
  <h1>CarbTrack AU</h1>
  <p>Scan a barcode to look up carb data</p>
</header>

<main>
  <div id="reader"></div>

  <div class="torch-row" id="torch-row">
    <button type="button" class="torch-btn" id="torch-btn" aria-pressed="false">Torch off</button>
  </div>

  <div class="manual-entry">
    <input type="text" id="barcode-input" placeholder="Enter barcode" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
    <button id="lookup-btn">Look up</button>
  </div>

  <div class="serving-row">
    <label for="serving-input">Serving:</label>
    <input type="number" id="serving-input" min="1" max="9999" step="1" placeholder="g">
    <span>grams</span>
  </div>

  <div class="result-card" id="result-card">
    <div id="result-content"></div>
  </div>

  <div class="status" id="status">Initialising camera&hellip;</div>
</main>

<script src="/static/html5-qrcode.min.js"></script>
<script>
(function () {
  "use strict";

  var OFF_API = "https://world.openfoodfacts.org/api/v2/product/";
  var API_BASE = window.location.origin;

  var barcodeInput = document.getElementById("barcode-input");
  var lookupBtn = document.getElementById("lookup-btn");
  var servingInput = document.getElementById("serving-input");
  var resultCard = document.getElementById("result-card");
  var resultContent = document.getElementById("result-content");
  var statusEl = document.getElementById("status");

  var lastFood = null;
  var scanner = null;
  var lastScan = { barcode: null, ts: 0 };
  var offSourceId = null;

  // --- Resolve OFF source_id on load ---
  fetch(API_BASE + "/sources")
    .then(function (res) { return res.json(); })
    .then(function (sources) {
      for (var i = 0; i < sources.length; i++) {
        if (sources[i].name === "Open Food Facts AU") {
          offSourceId = sources[i].id;
          break;
        }
      }
    })
    .catch(function (err) {
      console.error("Failed to resolve OFF source_id:", err);
    });

  // --- Scanner setup ---
  function initScanner() {
    scanner = new Html5Qrcode("reader");
    scanner.start(
      { facingMode: "environment" },
      {
        fps: 10,
        qrbox: function (viewfinderWidth, viewfinderHeight) {
          var s = Math.min(viewfinderWidth, viewfinderHeight);
          return { width: Math.floor(s * 0.85), height: Math.floor(s * 0.4) };
        },
        formatsToSupport: [
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.EAN_8,
          Html5QrcodeSupportedFormats.UPC_A,
        ],
        experimentalFeatures: { useBarCodeDetectorIfSupported: true },
        videoConstraints: {
          facingMode: "environment",
          width: { ideal: 1920 },
          height: { ideal: 1080 },
          advanced: [{ focusMode: "continuous" }]
        }
      },
      onScanSuccess,
      function () { /* ignore scan failure noise */ }
    ).then(function () {
      statusEl.textContent = "Point camera at a barcode";
      console.info(
        "BarcodeDetector " +
        (typeof BarcodeDetector !== "undefined"
          ? "native (ML Kit on Chrome Android)"
          : "JS fallback (ZXing) — slower, lower hit rate")
      );
      maybeEnableTorchButton();
    }).catch(function (err) {
      statusEl.textContent = "Camera unavailable \u2014 use manual entry";
      console.warn("Camera init failed:", err);
    });
  }

  // --- Torch (only available on devices that report the capability) ---
  function maybeEnableTorchButton() {
    if (!scanner || typeof scanner.getRunningTrackCapabilities !== "function") return;
    var caps;
    try {
      caps = scanner.getRunningTrackCapabilities();
    } catch (err) {
      console.warn("Could not query camera capabilities:", err);
      return;
    }
    // Show button if the camera reports any torch info — explicit `false` is the
    // only definitive "not supported". Some Chromium builds expose torch as
    // [true, false] (Image Capture draft); a plain truthy check would still
    // pass that, but `=== undefined` is the most permissive correct check.
    // If the hardware actually rejects, applyVideoConstraints catches and
    // surfaces "Torch unavailable on this device".
    if (!caps || caps.torch === undefined || caps.torch === false) return;

    var torchRow = document.getElementById("torch-row");
    var torchBtn = document.getElementById("torch-btn");
    if (!torchRow || !torchBtn) return;

    var torchOn = false;
    torchRow.className = "torch-row visible";
    torchBtn.addEventListener("click", function () {
      var next = !torchOn;
      scanner.applyVideoConstraints({ advanced: [{ torch: next }] })
        .then(function () {
          torchOn = next;
          torchBtn.textContent = torchOn ? "Torch on" : "Torch off";
          torchBtn.setAttribute("aria-pressed", torchOn ? "true" : "false");
          torchBtn.className = torchOn ? "torch-btn on" : "torch-btn";
        })
        .catch(function (err) {
          console.warn("Torch toggle failed:", err);
          statusEl.textContent = "Torch unavailable on this device";
        });
    });
  }

  function onScanSuccess(decodedText) {
    if (lastScan.barcode === decodedText && Date.now() - lastScan.ts < 3000) {
      return;
    }
    lastScan = { barcode: decodedText, ts: Date.now() };
    barcodeInput.value = decodedText;
    lookupBarcode(decodedText);
  }

  // --- Barcode validation ---
  function isValidBarcode(str) {
    return /^\d{8,14}$/.test(str);
  }

  // --- CarbTrack lookup (then OFF fallback) ---
  function lookupBarcode(barcode) {
    barcode = barcode.trim();
    if (!barcode) return;
    if (!isValidBarcode(barcode)) {
      resultContent.innerHTML = '<p class="error-msg">Enter a valid barcode (8\u201314 digits)</p>';
      resultCard.className = "result-card visible error";
      statusEl.textContent = "Invalid barcode format";
      return;
    }

    statusEl.textContent = "Looking up " + barcode + "\u2026";
    resultCard.className = "result-card";

    var controller = new AbortController();
    var timeout = setTimeout(function () { controller.abort(); }, 8000);

    fetch(API_BASE + "/foods/barcode/" + encodeURIComponent(barcode), {
      signal: controller.signal
    })
      .then(function (res) {
        clearTimeout(timeout);
        if (res.status === 404) {
          // Not in CarbTrack — try OFF
          return searchOFF(barcode);
        }
        if (!res.ok) throw new Error("API error (" + res.status + ")");
        return res.json().catch(function () {
          throw new Error("Unexpected response from server");
        });
      })
      .then(function (food) {
        if (!food) return; // OFF handler manages its own rendering
        lastFood = food;
        renderFood(food, "carbtrack");
        statusEl.textContent = "Scan another barcode or enter one below";
      })
      .catch(function (err) {
        clearTimeout(timeout);
        lastFood = null;
        var msg;
        if (err.name === "AbortError") {
          msg = "Request timed out \u2014 check your network connection";
        } else if (!navigator.onLine) {
          msg = "You appear to be offline \u2014 connect and try again";
        } else {
          msg = err.message;
        }
        resultContent.innerHTML = '<p class="error-msg">' + escapeHtml(msg) + "</p>";
        resultCard.className = "result-card visible error";
        statusEl.textContent = "Try another barcode";
      });
  }

  // --- Open Food Facts lookup ---
  function searchOFF(barcode) {
    statusEl.textContent = "Not in CarbTrack \u2014 searching Open Food Facts\u2026";

    var controller = new AbortController();
    var timeout = setTimeout(function () { controller.abort(); }, 8000);

    return fetch(OFF_API + encodeURIComponent(barcode) + ".json", {
      signal: controller.signal
    })
      .then(function (res) {
        clearTimeout(timeout);
        if (!res.ok) throw new Error("Open Food Facts returned " + res.status);
        return res.json();
      })
      .then(function (data) {
        if (!data.product || data.status === 0) {
          lastFood = null;
          resultContent.innerHTML = '<p class="error-msg">Barcode ' + escapeHtml(barcode) + ' not found in CarbTrack or Open Food Facts</p>';
          resultCard.className = "result-card visible error";
          statusEl.textContent = "Try another barcode";
          return null;
        }
        var mapped = mapOFFProduct(data.product, barcode);
        mapped._off_raw = data.product;
        lastFood = mapped;
        renderFood(mapped, "off");
        statusEl.textContent = "Found on Open Food Facts \u2014 import to CarbTrack?";
        return null; // renderFood handles display
      })
      .catch(function (err) {
        clearTimeout(timeout);
        console.error("OFF lookup error for barcode", barcode, ":", err);
        lastFood = null;
        var msg = (err && err.name === "AbortError")
          ? "Open Food Facts request timed out"
          : (err && err.message) ? err.message : "Open Food Facts lookup failed";
        resultContent.innerHTML = '<p class="error-msg">Barcode ' + escapeHtml(barcode) + ' not in CarbTrack. ' + escapeHtml(msg) + '</p>';
        resultCard.className = "result-card visible error";
        statusEl.textContent = "Try another barcode";
        return null;
      });
  }

  // --- Map OFF product to CarbTrack schema ---
  function safeFloat(val) {
    if (val == null || val === "") return null;
    var n = parseFloat(val);
    return isFinite(n) ? n : null;
  }

  function mapOFFProduct(product, barcode) {
    var n = product.nutriments || {};
    return {
      barcode: barcode,
      name: product.product_name || product.product_name_en || "Unknown",
      brand: product.brands || null,
      category: (product.categories_tags && product.categories_tags.length > 0)
        ? product.categories_tags[product.categories_tags.length - 1].replace("en:", "").replace(/-/g, " ")
        : null,
      carbs_per_100g: safeFloat(n.carbohydrates_100g),
      sugars_per_100g: safeFloat(n.sugars_100g),
      fibre_per_100g: safeFloat(n.fiber_100g),
      energy_kj: safeFloat(n["energy-kj_100g"]),
      protein_per_100g: safeFloat(n.proteins_100g),
      fat_per_100g: safeFloat(n.fat_100g),
      sodium_mg: n.sodium_100g != null ? safeFloat(n.sodium_100g) * 1000 : null,
      serving_size_g: parseServingSize(product.serving_size),
      source_confidence: 0.7
    };
  }

  function parseServingSize(str) {
    if (!str) return null;
    var match = str.match(/(\d+\.?\d*)\s*g/i);
    return match ? parseFloat(match[1]) : null;
  }

  // --- Rendering ---
  function renderFood(food, source) {
    if (food.carbs_per_100g == null || !isFinite(food.carbs_per_100g)) {
      resultContent.innerHTML = '<p class="error-msg">Carb data missing for this food. Do not use for dosing.</p>';
      resultCard.className = "result-card visible error";
      return;
    }

    var html = "";
    html += '<div class="food-name">' + escapeHtml(food.name) + "</div>";
    if (food.brand) html += '<div class="food-brand">' + escapeHtml(food.brand) + "</div>";
    if (food.category) html += '<div class="food-category">' + escapeHtml(food.category) + "</div>";

    if (food.conflict_flag) {
      html += '<span class="conflict-badge">Data conflict</span>';
    }

    if (source === "off") {
      html += '<span class="source-badge">Open Food Facts</span>';
    }

    html += '<div class="carb-hero">';
    html += '<span class="value">' + formatNum(food.carbs_per_100g) + "</span>";
    html += '<span class="unit">g carbs per 100 g</span>';
    html += "</div>";

    html += '<div class="serving-carbs" id="serving-carbs"></div>';

    // Nutrition grid
    var items = [
      ["Energy", food.energy_kj != null ? formatNum(food.energy_kj) + " kJ" : null],
      ["Sugars", food.sugars_per_100g != null ? formatNum(food.sugars_per_100g) + " g" : null],
      ["Fibre", food.fibre_per_100g != null ? formatNum(food.fibre_per_100g) + " g" : null],
      ["Protein", food.protein_per_100g != null ? formatNum(food.protein_per_100g) + " g" : null],
      ["Fat", food.fat_per_100g != null ? formatNum(food.fat_per_100g) + " g" : null],
      ["Sodium", food.sodium_mg != null ? formatNum(food.sodium_mg) + " mg" : null],
      ["GI", food.gi_rating || null],
      ["Serving", food.serving_size_g != null ? formatNum(food.serving_size_g) + " g" : null],
    ];
    var hasNutrition = items.some(function (i) { return i[1] != null; });
    if (hasNutrition) {
      html += '<div class="nutrition-grid">';
      items.forEach(function (i) {
        if (i[1] != null) {
          html += '<div class="item"><span class="label">' + i[0] + '</span><span>' + i[1] + "</span></div>";
        }
      });
      html += "</div>";
    }

    // Import buttons for OFF results
    if (source === "off") {
      html += '<div class="import-actions">';
      html += '<button class="btn-staging" id="btn-staging">Add to staging</button>';
      html += '<button class="btn-quick" id="btn-quick">Quick add</button>';
      html += "</div>";
    }

    resultContent.innerHTML = html;
    resultCard.className = "result-card visible";

    // Pre-fill serving size from food data if available and field is empty
    if (food.serving_size_g && !servingInput.value) {
      servingInput.value = Math.round(food.serving_size_g);
    }
    updateServingCarbs();

    // Bind import buttons
    if (source === "off") {
      var btnStaging = document.getElementById("btn-staging");
      var btnQuick = document.getElementById("btn-quick");
      if (btnStaging) btnStaging.addEventListener("click", function () { importToStaging(food); });
      if (btnQuick) btnQuick.addEventListener("click", function () { importQuickAdd(food); });
    }
  }

  // --- Import: staging (with conflict detection) ---
  function importToStaging(food) {
    if (!offSourceId) {
      statusEl.textContent = "Cannot import \u2014 Open Food Facts source not found in CarbTrack";
      return;
    }
    var btn = document.getElementById("btn-staging");
    if (btn) { btn.disabled = true; btn.textContent = "Submitting\u2026"; }

    // Build mapped_data (what the staging pipeline expects after field mapping)
    var mapped = buildMappedData(food);

    // Submit raw OFF data to staging, then immediately set mapped_data
    var body = {
      source_id: offSourceId,
      raw_data: JSON.stringify(food._off_raw || {})
    };

    fetch(API_BASE + "/staging", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    })
      .then(function (res) {
        if (!res.ok) return res.json().then(function (e) { throw new Error(e.detail || "Staging submit failed"); });
        return res.json();
      })
      .then(function (staging) {
        // Set mapped_data so it can be approved
        return fetch(API_BASE + "/staging/" + staging.id + "/set-mapped", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mapped_data: JSON.stringify(mapped) })
        }).then(function (res) {
          if (!res.ok) return res.json().then(function (e) { throw new Error(e.detail || "Set mapped data failed"); });
        });
      })
      .then(function () {
        if (btn) { btn.textContent = "Added"; }
        resultContent.insertAdjacentHTML("beforeend", '<p class="success-msg" style="margin-top:0.75rem">Submitted to staging \u2014 ready for approval</p>');
        statusEl.textContent = "Added to staging \u2014 ready for approval";
      })
      .catch(function (err) {
        if (btn) { btn.disabled = false; btn.textContent = "Add to staging"; }
        statusEl.textContent = "Import failed: " + err.message;
      });
  }

  // --- Import: quick add (direct to foods) ---
  function importQuickAdd(food) {
    if (!offSourceId) {
      statusEl.textContent = "Cannot import \u2014 Open Food Facts source not found in CarbTrack";
      return;
    }
    var btn = document.getElementById("btn-quick");
    if (btn) { btn.disabled = true; btn.textContent = "Adding\u2026"; }

    var body = buildMappedData(food);
    body.source_id = offSourceId;
    body.source_confidence = food.source_confidence || 0.7;

    fetch(API_BASE + "/foods", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    })
      .then(function (res) {
        if (res.status === 409) throw new Error("A food with this barcode already exists");
        if (!res.ok) return res.json().then(function (e) { throw new Error(e.detail || "Quick add failed"); });
        return res.json();
      })
      .then(function (created) {
        lastFood = created;
        if (btn) { btn.textContent = "Added"; }
        // Disable both buttons after successful quick add
        var btnStaging = document.getElementById("btn-staging");
        if (btnStaging) btnStaging.disabled = true;
        resultContent.insertAdjacentHTML("beforeend", '<p class="success-msg" style="margin-top:0.75rem">Added to CarbTrack (ID ' + created.id + ')</p>');
        statusEl.textContent = "Food added \u2014 scan another barcode";
      })
      .catch(function (err) {
        if (btn) { btn.disabled = false; btn.textContent = "Quick add"; }
        statusEl.textContent = "Import failed: " + err.message;
      });
  }

  // --- Build mapped data for CarbTrack schema ---
  function buildMappedData(food) {
    var mapped = {
      name: food.name,
      carbs_per_100g: food.carbs_per_100g
    };
    if (food.barcode) mapped.barcode = food.barcode;
    if (food.brand) mapped.brand = food.brand;
    if (food.category) mapped.category = food.category;
    if (food.sugars_per_100g != null) mapped.sugars_per_100g = food.sugars_per_100g;
    if (food.fibre_per_100g != null) mapped.fibre_per_100g = food.fibre_per_100g;
    if (food.energy_kj != null) mapped.energy_kj = food.energy_kj;
    if (food.protein_per_100g != null) mapped.protein_per_100g = food.protein_per_100g;
    if (food.fat_per_100g != null) mapped.fat_per_100g = food.fat_per_100g;
    if (food.sodium_mg != null) mapped.sodium_mg = food.sodium_mg;
    if (food.serving_size_g != null) mapped.serving_size_g = food.serving_size_g;
    return mapped;
  }

  function updateServingCarbs() {
    var el = document.getElementById("serving-carbs");
    if (!el || !lastFood) return;

    var grams = parseFloat(servingInput.value);
    if (!grams || grams <= 0 || grams > 9999) {
      el.className = "serving-carbs";
      return;
    }

    var carbsForServing = (lastFood.carbs_per_100g * grams) / 100;
    el.innerHTML =
      '<span class="value">' + formatNum(carbsForServing) + ' g</span>' +
      '<span class="label">carbs for ' + Math.round(grams) + ' g serve</span>';
    el.className = "serving-carbs visible";
  }

  // --- Utilities ---
  function formatNum(n) {
    return Number(n).toFixed(1);
  }

  function escapeHtml(str) {
    var div = document.createElement("div");
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  // --- Event listeners ---
  lookupBtn.addEventListener("click", function () {
    lookupBarcode(barcodeInput.value);
  });

  barcodeInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      e.preventDefault();
      lookupBarcode(barcodeInput.value);
    }
  });

  servingInput.addEventListener("input", updateServingCarbs);

  // --- Init ---
  if (typeof Html5Qrcode !== "undefined") {
    initScanner();
  } else {
    statusEl.textContent = "Scanner library failed to load \u2014 use manual entry";
  }
})();
</script>
</body>
</html>
